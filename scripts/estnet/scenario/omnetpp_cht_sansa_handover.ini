[General]
# =====================================================================
# CHT x SANSA GEO<->MEO HANDOVER packet-trace scenario — FULL 6-HOUR TIMELINE.
# Faithful replay of the viewer's demo-balanced-v1 handover timeline: 6 serving
# phases / 5 cross-orbit migrations + 1 initial GEO acquisition = the 6 handover
# events of golden D1 (computeRuntimeProjection on the pinned 2026-06-15 demo).
# Produces a REAL ESTNeT packet trace whose end-to-end latency STEPS each time
# the active relay hands over between the APSTAR-7 GEO (~38,700 km) and one of
# three Galileo MEOs (~27,100 km).
#
#   CHT (cg[0]/node5) <--RF--> [ APSTAR-7  GEO (sat[0]/node1)  continuous   ] <--RF--> SANSA (cg[1]/node6)
#                              [ GSAT0102  MEO (sat[1]/node2)  ph2 00:49.. ]
#                              [ GSAT0232  MEO (sat[2]/node3)  ph4 03:08.. ]
#                              [ GSAT0209  MEO (sat[3]/node4)  ph6 05:53.. ]
#
# WHY A CONTACT PLAN + MULTIPLE APP PHASES (see configs/*_handover.incl):
#   * A directional GS yagi can only point one way at a time, so it cannot track
#     the GEO and a MEO at once -- the re-pointing IS the handover. The moving
#     relay is steered by ContactPlanBasedNodeTracking + a NON-OVERLAPPING
#     per-GS contact plan (cht_sansa_handover.cp): six serving windows
#     GEO[0,2970]->MEO0102[2970,5400]->GEO[5400,11310]->MEO0232[11310,13620]->
#     GEO[13620,21180]->MEO0209[21180,21600] sim-seconds (t=0 == 2026-06-15T00:00Z).
#   * Stock ESTNeT cannot relay one packet GS-A -> Sat -> GS-B (RadioHost floods
#     ground stations on broadcast, bypassing the sat), and a single BasicApp's
#     destinationNodes is not volatile, so each phase uses its OWN windowed
#     uplink/downlink BasicApp pair routed through the then-active sat. The
#     adapter composes the two one-hop legs per phase and concatenates phases.
#
# APP / leg map (appId = wrapper index; destAppId set to cross-wire each leg):
#   ph1 (GEO node1,  t30..2960):     CHT.app0->node1 ; sat0.app0->node6 ; sink SANSA.app0
#   ph2 (MEO node2,  t3020..5445):   CHT.app1->node2 ; sat1.app0->node6 ; sink SANSA.app1
#   ph3 (GEO node1,  t5450..11355):  CHT.app2->node1 ; sat0.app1->node6 ; sink SANSA.app2
#   ph4 (MEO node3,  t11360..13610): CHT.app3->node3 ; sat2.app0->node6 ; sink SANSA.app3
#   ph5 (GEO node1,  t13670..21225): CHT.app4->node1 ; sat0.app2->node6 ; sink SANSA.app4
#   ph6 (MEO node4,  t21230..21590): CHT.app5->node4 ; sat3.app0->node6 ; sink SANSA.app5
#
# RE-POINT GAP TRAFFIC (deliberate, discloses REAL handover loss):
#   Phases 2/3/5 keep SENDING ~45 s PAST their contact-plan boundary
#   (5400 / 11310 / 21180 s) while both GS dishes have already re-pointed to
#   the next relay -- the RF model genuinely drops those frames (mispointed
#   yagi -> SNIR below threshold), producing a real packet-loss spike that
#   STARTS at the geometry-true handover instant. Each next stream starts 50 s
#   after its boundary, so phase send-spans stay non-overlapping.
#   EMPIRICAL ASYMMETRY (verified on the .vec, not scripted): at the other two
#   boundaries (2970 GEO->MEO0102 AOS, 13620 MEO0232 LOS) the old relay stays
#   angularly close enough to the new pointing that overrun frames still
#   DELIVER via the antenna pattern -- and a delivered below-mask MEO frame
#   would break the fixture's golden-D1 mask alignment -- so phases 1/4 send
#   no overrun traffic (stock -10 s guard stop). The loss is a MODELING
#   CONSEQUENCE of a single dish sending through the re-point, not an RF fade
#   measurement (adapter nonClaims).
#
# HONESTY (R12): ESTNeT-SIMULATED, not operator-measured. The GEO<->MEO route
# preference mirrors the viewer's demo-balanced-v1 SHOWCASE policy (it is NOT an
# RF-failure-driven handover -- the GEO stays visible the whole run); the
# satellites are genuinely mutually visible at those times (independently SGP4-
# verified). 20 W sat EIRP + 9600 bps PHY are assumed link params.
# =====================================================================

sim-time-limit = 21600s

include configs/basic.incl

# RECORDING — ON
record-eventlog = false
**.vector-recording = true
**.scalar-recording = true
**.statistic-recording = true
**.bin-recording = false

# SATELLITE ORBIT — APSTAR-7 GEO (node1) + 3 Galileo MEO (node2/3/4); explicit UTC epoch
include configs/orbit_cht_sansa_handover.incl

# GROUND STATIONS — CHT (node5) + SANSA (node6), internet off, ContactPlanBasedNodeTracking
include configs/gs_cht_sansa_handover.incl

# CONTACT PLAN — drives the antenna handover (non-overlapping per-GS contacts)
*.contactPlanManager.contactPlanFile = "./configs/cht_sansa_handover.cp"

# RADIO — GEO-strengthened (sat 20 W); MEO is closer so it closes with more margin
include configs/radio_geo_strong.incl

# ANTENNA
include configs/antenna_sat_isotropic.incl
include configs/antenna_gs_yagi.incl

# MAC
include configs/mac_simple.incl

# PROTOCOL — unicast (broadcast would flood GSs directly and bypass the sat)
*.*.hostType = "estnet.protocol.simpleprotocol.SimpleProtocolNode"
*.*.networkHost.protocolModule.useBroadcasts = false

# APP COUNTS (per node)
*.cg[0].networkHost.numApps = 6
*.cg[1].networkHost.numApps = 6
*.sat[0].networkHost.numApps = 3
*.sat[1].networkHost.numApps = 1
*.sat[2].networkHost.numApps = 1
*.sat[3].networkHost.numApps = 1
*.*.networkHost.appWrapper[*].appType = "BasicApp"

# Common app cadence (sendInterval = 10 s, full-6h timeline ~2150 samples)
*.*.networkHost.appWrapper[*].app.sendInterval = 10s
*.*.networkHost.appWrapper[*].app.payloadSize = 100B

# ---- PHASE 1 : GEO uplink CHT(node5)->APSTAR-7(node1) ----
*.cg[0].networkHost.appWrapper[0].app.sending = true
*.cg[0].networkHost.appWrapper[0].app.startTime = 30s
*.cg[0].networkHost.appWrapper[0].app.stopTime = 2960s
*.cg[0].networkHost.appWrapper[0].app.destinationNodes = "1"
*.cg[0].networkHost.appWrapper[0].app.destAppId = 0
# ---- PHASE 1 : GEO downlink APSTAR-7(node1)->SANSA(node6) ----
*.sat[0].networkHost.appWrapper[0].app.sending = true
*.sat[0].networkHost.appWrapper[0].app.startTime = 30s
*.sat[0].networkHost.appWrapper[0].app.stopTime = 2960s
*.sat[0].networkHost.appWrapper[0].app.destinationNodes = "6"
*.sat[0].networkHost.appWrapper[0].app.destAppId = 0

# ---- PHASE 2 : MEO uplink CHT(node5)->GSAT0102(node2) ----
*.cg[0].networkHost.appWrapper[1].app.sending = true
*.cg[0].networkHost.appWrapper[1].app.startTime = 3020s
*.cg[0].networkHost.appWrapper[1].app.stopTime = 5445s
*.cg[0].networkHost.appWrapper[1].app.destinationNodes = "2"
*.cg[0].networkHost.appWrapper[1].app.destAppId = 0
# ---- PHASE 2 : MEO downlink GSAT0102(node2)->SANSA(node6) ----
*.sat[1].networkHost.appWrapper[0].app.sending = true
*.sat[1].networkHost.appWrapper[0].app.startTime = 3020s
*.sat[1].networkHost.appWrapper[0].app.stopTime = 5445s
*.sat[1].networkHost.appWrapper[0].app.destinationNodes = "6"
*.sat[1].networkHost.appWrapper[0].app.destAppId = 1

# ---- PHASE 3 : GEO uplink CHT(node5)->APSTAR-7(node1) ----
*.cg[0].networkHost.appWrapper[2].app.sending = true
*.cg[0].networkHost.appWrapper[2].app.startTime = 5450s
*.cg[0].networkHost.appWrapper[2].app.stopTime = 11355s
*.cg[0].networkHost.appWrapper[2].app.destinationNodes = "1"
*.cg[0].networkHost.appWrapper[2].app.destAppId = 1
# ---- PHASE 3 : GEO downlink APSTAR-7(node1)->SANSA(node6) ----
*.sat[0].networkHost.appWrapper[1].app.sending = true
*.sat[0].networkHost.appWrapper[1].app.startTime = 5450s
*.sat[0].networkHost.appWrapper[1].app.stopTime = 11355s
*.sat[0].networkHost.appWrapper[1].app.destinationNodes = "6"
*.sat[0].networkHost.appWrapper[1].app.destAppId = 2

# ---- PHASE 4 : MEO uplink CHT(node5)->GSAT0232(node3) ----
*.cg[0].networkHost.appWrapper[3].app.sending = true
*.cg[0].networkHost.appWrapper[3].app.startTime = 11360s
*.cg[0].networkHost.appWrapper[3].app.stopTime = 13610s
*.cg[0].networkHost.appWrapper[3].app.destinationNodes = "3"
*.cg[0].networkHost.appWrapper[3].app.destAppId = 0
# ---- PHASE 4 : MEO downlink GSAT0232(node3)->SANSA(node6) ----
*.sat[2].networkHost.appWrapper[0].app.sending = true
*.sat[2].networkHost.appWrapper[0].app.startTime = 11360s
*.sat[2].networkHost.appWrapper[0].app.stopTime = 13610s
*.sat[2].networkHost.appWrapper[0].app.destinationNodes = "6"
*.sat[2].networkHost.appWrapper[0].app.destAppId = 3

# ---- PHASE 5 : GEO uplink CHT(node5)->APSTAR-7(node1) ----
*.cg[0].networkHost.appWrapper[4].app.sending = true
*.cg[0].networkHost.appWrapper[4].app.startTime = 13670s
*.cg[0].networkHost.appWrapper[4].app.stopTime = 21225s
*.cg[0].networkHost.appWrapper[4].app.destinationNodes = "1"
*.cg[0].networkHost.appWrapper[4].app.destAppId = 2
# ---- PHASE 5 : GEO downlink APSTAR-7(node1)->SANSA(node6) ----
*.sat[0].networkHost.appWrapper[2].app.sending = true
*.sat[0].networkHost.appWrapper[2].app.startTime = 13670s
*.sat[0].networkHost.appWrapper[2].app.stopTime = 21225s
*.sat[0].networkHost.appWrapper[2].app.destinationNodes = "6"
*.sat[0].networkHost.appWrapper[2].app.destAppId = 4

# ---- PHASE 6 : MEO uplink CHT(node5)->GSAT0209(node4) ----
*.cg[0].networkHost.appWrapper[5].app.sending = true
*.cg[0].networkHost.appWrapper[5].app.startTime = 21230s
*.cg[0].networkHost.appWrapper[5].app.stopTime = 21590s
*.cg[0].networkHost.appWrapper[5].app.destinationNodes = "4"
*.cg[0].networkHost.appWrapper[5].app.destAppId = 0
# ---- PHASE 6 : MEO downlink GSAT0209(node4)->SANSA(node6) ----
*.sat[3].networkHost.appWrapper[0].app.sending = true
*.sat[3].networkHost.appWrapper[0].app.startTime = 21230s
*.sat[3].networkHost.appWrapper[0].app.stopTime = 21590s
*.sat[3].networkHost.appWrapper[0].app.destinationNodes = "6"
*.sat[3].networkHost.appWrapper[0].app.destAppId = 5

# ---- SANSA receive-only sinks (one per phase, appId = wrapper index) ----
*.cg[1].networkHost.appWrapper[*].app.sending = false
