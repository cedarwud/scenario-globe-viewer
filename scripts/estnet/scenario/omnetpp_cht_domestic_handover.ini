[General]
# =====================================================================
# cht-yangmingshan x cht-fangshan FULL-CHAIN HANDOVER packet-trace scenario.
# GENERATED by scripts/estnet/generate_handover_scenario.mjs — do not hand-edit; regenerate instead.
# Faithful replay of the viewer's demo-balanced-v1 timeline on the
# pinned demo window: 25 serving phases across 23 relay satellites
# (LEO 17 / MEO 3 / GEO 3) — the full LEO+MEO+GEO chain this pair
# geometrically supports (CHT x SANSA cannot: its LEO mutual count is 0).
# Same architecture as omnetpp_cht_sansa_handover.ini: per-phase windowed
# uplink/downlink BasicApp pairs over two real one-hop RF legs, antenna
# re-point driven by a non-overlapping contact plan. BASELINE = LOSS-FREE:
# no re-point overrun traffic is sent (send windows sit inside each phase).
# HONESTY (R12): ESTNeT-SIMULATED, not operator-measured; route preference
# mirrors the viewer's showcase policy; 20 W EIRP + 9600 bps assumed.
# =====================================================================

sim-time-limit = 21600s

include configs/basic.incl

# RECORDING — app vectors only, minus the 0.1 s throughput streams the
# adapter never reads. With 23 satellites and 75 apps, BasicApp's
# sentThroughput/rcvdThroughput vectors alone are ~200k rows per app over
# the 6 h window; the adapter consumes rcvdThroughput ONLY on the sink
# side (sat + cg[1]). OMNeT ini matching is first-match-wins: specific
# rules precede the global off switch.
record-eventlog = false
**.app.sentThroughput.result-recording-modes = -vector
*.cg[0].networkHost.appWrapper[*].app.rcvdThroughput.result-recording-modes = -vector
**.appWrapper[*].**.vector-recording = true
**.vector-recording = false
**.scalar-recording = true
**.statistic-recording = true
**.bin-recording = false

include configs/orbit_cht_domestic_handover.incl
include configs/gs_cht_domestic_handover.incl

*.contactPlanManager.contactPlanFile = "./configs/cht_domestic_handover.cp"

# RADIO — GEO-strengthened (sat 20 W); MEO/LEO are closer so they close with more margin
include configs/radio_geo_strong.incl
include configs/antenna_sat_isotropic.incl
include configs/antenna_gs_yagi.incl
include configs/mac_simple.incl

# PROTOCOL — unicast (broadcast would flood GSs directly and bypass the sat)
*.*.hostType = "estnet.protocol.simpleprotocol.SimpleProtocolNode"
*.*.networkHost.protocolModule.useBroadcasts = false

