[General]
# =====================================================================
# CHT x SANSA GEO packet-trace scenario for the ESTNeT-trace pipeline.
#
#   CHT-Yangmingshan (TW) <--uplink RF--> APSTAR-7 GEO ~76.5E <--downlink RF--> SANSA-Hartebeesthoek (ZA)
#
# Goal: produce a REAL ESTNeT packet trace (latency / throughput / loss /
# hops) for the GS-A -> Satellite -> GS-B path of the scenario-globe-viewer
# demo, using the viewer's own pinned TLE.
#
# WHY TWO ONE-HOP LEGS INSTEAD OF A BROADCAST 2-HOP:
# Stock ESTNeT cannot relay a single broadcast packet GS-A -> Sat -> GS-B.
# RadioHost's broadcast branch (RadioHost.cc ~125-133) floods EVERY ground
# station via an instant sendDirect, unconditionally -- it does NOT honour
# internetConnection=false (only the unicast path checks it). So a broadcast
# from CHT reaches SANSA in 0 ms over a ground shortcut, bypassing the
# satellite. We therefore model the end-to-end path as two genuine one-hop
# unicast RF legs and compose them in the adapter:
#   Leg 1 (uplink):   CHT (node 2)  --unicast-->  SAT (node 1)
#   Leg 2 (downlink): SAT (node 1)  --unicast-->  SANSA (node 3)
# Each leg is a real radio transmission (real FSPL, real link-budget reception
# decision, real ~128.6 ms one-way propagation). The adapter sums the legs:
#   end-to-end latency = uplink + downlink ;  loss = 1-(1-Lup)(1-Ldn).
#
# Antenna pointing: the ground-station yagi is directional (18.9 dB boresight),
# so each GS uses TargetTracking aimed at the relay sat (node 1); see
# gs_cht_sansa.incl. The sat antenna is isotropic and needs no pointing.
#
# HONESTY (R12): ESTNeT-SIMULATED, not operator-measured. The 20 W sat EIRP
# (radio_geo_strong.incl) is an assumed link config chosen to close the GEO
# link; per-leg latency is dominated by the stock 9600 bps cubesat
# serialization (~118 ms) on top of ~128.6 ms GEO propagation.
# =====================================================================

sim-time-limit = 360s

# BASIC (network, SQLite result managers, visualization model paths)
include configs/basic.incl

# RECORDING — ON (stock template ships recording_off; we need the vectors)
record-eventlog = false
**.vector-recording = true
**.scalar-recording = true
**.statistic-recording = true
**.bin-recording = false

# SATELLITE ORBIT — single APSTAR-7 GEO (same relay as the handover scenario);
#                   explicit sim epoch t=0 == 2026-06-15T00:00:00Z (pinned demo window)
include configs/orbit_cht_sansa_geo.incl

# GROUND STATIONS — CHT (cg[0]/node2) + SANSA (cg[1]/node3), internet off,
#                   yagis TargetTracking-pointed at the sat (node 1)
include configs/gs_cht_sansa.incl

# RADIO — GEO-strengthened (sat 20 W) so the ~38,700 km link closes
include configs/radio_geo_strong.incl

# ANTENNA
include configs/antenna_sat_isotropic.incl
include configs/antenna_gs_yagi.incl

# MAC
include configs/mac_simple.incl

# PROTOCOL — unicast (NOT broadcast: broadcast would flood GSs directly and
#            bypass the satellite, see header)
*.*.hostType = "estnet.protocol.simpleprotocol.SimpleProtocolNode"
*.*.networkHost.protocolModule.useBroadcasts = false

# APP — one BasicApp per node; CHT drives the uplink leg, the sat drives the
#       downlink leg. Same cadence + count so the adapter aligns them by index.
*.*.networkHost.numApps = 1
*.*.networkHost.appWrapper[*].appType = "BasicApp"

# Leg 1 — CHT (cg[0]) -> SAT (node 1), uplink
*.cg[0].networkHost.appWrapper[0].app.sending = true
*.cg[0].networkHost.appWrapper[0].app.startTime = 30s
*.cg[0].networkHost.appWrapper[0].app.sendInterval = 5s
*.cg[0].networkHost.appWrapper[0].app.stopTime = 330s
*.cg[0].networkHost.appWrapper[0].app.payloadSize = 100B
*.cg[0].networkHost.appWrapper[0].app.destinationNodes = "1"   # SAT

# Leg 2 — SAT (sat[0]) -> SANSA (node 3), downlink
*.sat[0].networkHost.appWrapper[0].app.sending = true
*.sat[0].networkHost.appWrapper[0].app.startTime = 30s
*.sat[0].networkHost.appWrapper[0].app.sendInterval = 5s
*.sat[0].networkHost.appWrapper[0].app.stopTime = 330s
*.sat[0].networkHost.appWrapper[0].app.payloadSize = 100B
*.sat[0].networkHost.appWrapper[0].app.destinationNodes = "3"   # SANSA
